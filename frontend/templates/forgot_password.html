<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mot de passe oublie - SIM Box Fraud Detection</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body class="login-body">
<div class="login-container">
    <div class="login-card">
        <div class="login-header">
            <div class="login-icon">&#128272;</div>
            <h1>Mot de passe oublie ?</h1>
            <p>Entrez votre email pour recevoir un code de reinitialisation</p>
        </div>

        {% if error %}
        <div class="login-error">{{ error }}</div>
        {% endif %}

        <form method="POST" action="/forgot-password">
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" placeholder="votre@email.com" required autofocus>
            </div>
            <button type="submit" class="btn-login">Envoyer le code</button>
        </form>

        <div class="login-links">
            <a href="/login">Retour a la connexion</a>
        </div>
    </div>
</div>
</body>
</html>
