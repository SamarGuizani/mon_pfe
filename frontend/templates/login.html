<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion - SIM Box Fraud Detection</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body class="login-body">
<div class="login-container">
    <div class="login-card">
        <div class="login-header">
            <div class="login-icon">&#128274;</div>
            <h1>SIM Box Fraud Detection</h1>
            <p>Connectez-vous pour acceder au dashboard</p>
        </div>

        {% if error %}
        <div class="login-error">{{ error }}</div>
        {% endif %}

        <form method="POST" action="/login">
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" placeholder="votre@email.com" required autofocus>
            </div>
            <div class="form-group">
                <label for="password">Mot de passe</label>
                <input type="password" id="password" name="password" placeholder="Mot de passe" required>
            </div>
            <button type="submit" class="btn-login">Se connecter</button>
        </form>

        <div class="login-links">
            <a href="/forgot-password">Mot de passe oublie ?</a>
            <a href="/signup">Creer un compte</a>
        </div>

        <div class="login-footer">
            <p>PFE - Detection de Fraude SIM Box | Samar 2026</p>
        </div>
    </div>
</div>
</body>
</html>
